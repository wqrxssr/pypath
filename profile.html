<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PyPath — Профиль</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="logo">
                <i class="fas fa-code"></i> PyPath
            </div>
            <div class="stats-bar">
                <div class="stat"><i class="fas fa-star"></i> <span id="scoreValue">0</span></div>
                <div class="stat"><i class="fas fa-trophy"></i> <span id="bestScoreValue">0</span></div>
            </div>
            <div class="actions-bar">
                <button id="backBtn" class="icon-btn"><i class="fas fa-arrow-left"></i> <span>Назад</span></button>
            </div>
        </div>

        <!-- Профиль -->
        <div class="glass-card" style="margin-bottom: 24px;">
            <div class="profile-header">
                <div class="avatar" id="userAvatar">M</div>
                <div>
                    <h2 id="userEmail"></h2>
                    <div class="rank-badge" id="rankBadge">
                        <i class="fas fa-crown"></i> <span id="profileRank">Бронзовый код</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Статистика -->
        <div class="stats-grid">
            <div class="glass-card">
                <h3><i class="fas fa-chart-line"></i> Общая статистика</h3>
                <div style="margin-top: 16px; display: flex; flex-direction: column; gap: 12px;">
                    <div><i class="fas fa-star"></i> Всего очков: <strong id="totalScore">0</strong></div>
                    <div><i class="fas fa-trophy"></i> Лучший результат: <strong id="bestScore">0</strong></div>
                    <div><i class="fas fa-fire"></i> Макс. стрейк: <strong id="maxStreak">0</strong></div>
                    <div><i class="fas fa-check-circle"></i> Пройдено уроков: <strong id="completedLessonsCount">0</strong>/99</div>
                    <div><i class="fas fa-crown"></i> Золотых корон: <strong id="goldenCrownsCount">0</strong></div>
                </div>
            </div>
            <div class="glass-card">
                <h3><i class="fas fa-medal"></i> Достижения</h3>
                <div id="achievementsList" class="achievements-list" style="margin-top: 16px;"></div>
            </div>
        </div>

        <!-- Настройки -->
        <div class="glass-card" style="margin-bottom: 24px;">
            <h3><i class="fas fa-sliders-h"></i> Настройки</h3>
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border);">
                <span><i class="fas fa-moon"></i> Тёмная тема</span>
                <label class="switch">
                    <input type="checkbox" id="darkModeToggle">
                    <span class="slider"></span>
                </label>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px 0;">
                <span><i class="fas fa-volume-up"></i> Звуки</span>
                <label class="switch">
                    <input type="checkbox" id="soundsToggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <!-- Сертификат -->
        <div class="glass-card" style="margin-bottom: 24px; text-align: center;">
            <h3><i class="fas fa-certificate"></i> Сертификат</h3>
            <p style="color: var(--text-secondary); margin: 8px 0;">Доступен при достижении ранга "Мастер Python" (8000 очков)</p>
            <button id="downloadCertificateBtn" class="btn-primary">
                <i class="fas fa-download"></i> Скачать сертификат
            </button>
        </div>

        <!-- Опасная зона -->
        <div class="glass-card" style="text-align: center; border-color: #ff3b30;">
            <h3 style="color: #ff3b30;"><i class="fas fa-exclamation-triangle"></i> Опасная зона</h3>
            <button id="resetProgressBtn" class="btn-secondary" style="margin-top: 12px; border-color: #ff3b30; color: #ff3b30;">
                <i class="fas fa-trash"></i> Сбросить прогресс
            </button>
        </div>
    </div>

    <style>
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--border);
            transition: 0.2s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.2s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--accent-color);
        }
        input:checked + .slider:before {
            transform: translateX(24px);
        }
    </style>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>

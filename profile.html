<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPath — Профиль</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #0a0a1a; color: white; }
        #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .container { position: relative; z-index: 2; max-width: 800px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: rgba(10,10,26,0.7); backdrop-filter: blur(16px); border-radius: 60px; padding: 12px 24px; margin-bottom: 40px; border: 1px solid rgba(59,130,246,0.2); }
        .back-btn { background: transparent; border: none; color: #94a3b8; cursor: pointer; font-size: 1rem; }
        .profile-card { background: rgba(15,20,35,0.6); backdrop-filter: blur(12px); border-radius: 28px; padding: 32px; text-align: center; border: 1px solid rgba(59,130,246,0.2); }
        .avatar-large { width: 100px; height: 100px; background: linear-gradient(135deg,#3B82F6,#8b5cf6); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 2.5rem; font-weight: bold; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin: 32px 0; }
        .stat-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 16px; text-align: center; }
        .btn { background: linear-gradient(135deg,#3B82F6,#1d4ed8); border: none; padding: 12px 24px; border-radius: 40px; color: white; cursor: pointer; margin-top: 20px; }
        .danger { background: linear-gradient(135deg,#ef4444,#dc2626); margin-top: 20px; }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    <div class="container">
        <div class="header">
            <div class="logo"><i class="fab fa-python"></i> <span>PyPath</span></div>
            <button class="back-btn" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-left"></i> На главную</button>
        </div>
        <div class="profile-card">
            <div class="avatar-large">M</div>
            <h2 id="userName">Мария</h2>
            <p style="color:#94a3b8">Python-разработчик</p>
            <div class="stats-grid">
                <div class="stat-card"><i class="fas fa-star" style="color:#FFD43B"></i><br><span id="totalScore">0</span><br>очков</div>
                <div class="stat-card"><i class="fas fa-check-circle" style="color:#22c55e"></i><br><span id="lessonsCount">0</span>/99<br>уроков</div>
                <div class="stat-card"><i class="fas fa-fire" style="color:#FFD43B"></i><br><span id="streakCount">0</span><br>дней</div>
                <div class="stat-card"><i class="fas fa-crown" style="color:#FFD43B"></i><br><span id="rankName">Бронзовый код</span></div>
            </div>
            <button class="btn" id="certBtn"><i class="fas fa-download"></i> Скачать сертификат</button>
            <button class="btn danger" id="resetBtn"><i class="fas fa-trash"></i> Сбросить прогресс</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resize(); window.addEventListener('resize', resize);
        const particles = [];
        for (let i = 0; i < 80; i++) particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: Math.random() * 2, a: Math.random() * 0.3, vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.2 });
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); for (let p of particles) { p.x += p.vx; p.y += p.vy; if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0; if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fillStyle = `rgba(59, 130, 246, ${p.a})`; ctx.fill(); } requestAnimationFrame(animate); }
        animate();
        document.getElementById('certBtn').onclick = () => alert('Сертификат будет доступен после 8000 очков');
        document.getElementById('resetBtn').onclick = () => { if(confirm('Сбросить прогресс?')) alert('Прогресс сброшен'); };
    </script>
</body>
</html>

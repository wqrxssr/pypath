<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPath — Профиль</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',system-ui,sans-serif;background:#0a0a1a;color:#fff;min-height:100vh}
        #particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
        body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background-image:linear-gradient(rgba(59,130,246,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
        .container{position:relative;z-index:2;max-width:800px;margin:0 auto;padding:20px}
        .header{display:flex;justify-content:space-between;align-items:center;background:rgba(15,20,35,0.7);backdrop-filter:blur(16px);border-radius:60px;padding:12px 24px;margin-bottom:32px;border:1px solid rgba(59,130,246,0.2)}
        .logo i{color:#FFD43B}
        .logo span{background:linear-gradient(135deg,#3B82F6,#FFD43B);-webkit-background-clip:text;background-clip:text;color:transparent}
        .back-btn{background:0;border:none;color:#94a3b8;cursor:pointer;font-size:1rem}
        .back-btn:hover{color:#3B82F6}
        .profile-card{background:rgba(15,20,35,0.6);backdrop-filter:blur(12px);border-radius:28px;padding:32px;text-align:center;border:1px solid rgba(59,130,246,0.2)}
        .avatar-large{width:100px;height:100px;background:linear-gradient(135deg,#3B82F6,#8b5cf6);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:2.5rem;font-weight:bold;text-transform:uppercase}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin:32px 0}
        .stat-card{background:rgba(255,255,255,0.05);border-radius:20px;padding:16px;transition:0.2s}
        .stat-card:hover{background:rgba(59,130,246,0.1);transform:translateY(-2px)}
        .stat-card i{font-size:1.5rem;margin-bottom:8px;display:block}
        .stat-card i.fa-star{color:#FFD43B}
        .stat-card i.fa-check-circle{color:#22c55e}
        .stat-card i.fa-fire{color:#FFD43B}
        .stat-card i.fa-crown{color:#FFD43B}
        .achievements-list{text-align:left;margin:20px 0}
        .achievement-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
        .btn{background:linear-gradient(135deg,#3B82F6,#1d4ed8);border:none;padding:12px 24px;border-radius:40px;color:#fff;font-weight:bold;cursor:pointer;margin-top:20px;width:100%;transition:0.2s}
        .btn:hover{transform:translateY(-2px);box-shadow:0 0 15px rgba(59,130,246,0.4)}
        .btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626)}
        .btn-danger:hover{box-shadow:0 0 15px rgba(239,68,68,0.4)}
        .setting{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
        .switch{position:relative;display:inline-block;width:50px;height:24px}
        .switch input{opacity:0;width:0;height:0}
        .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#333;transition:0.3s;border-radius:24px}
        .slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background-color:#fff;transition:0.3s;border-radius:50%}
        input:checked+.slider{background-color:#3B82F6}
        input:checked+.slider:before{transform:translateX(26px)}
        .user-stats{display:flex;gap:12px;align-items:center}
        .stat{background:rgba(255,255,255,0.05);padding:6px 12px;border-radius:40px;font-size:0.8rem;display:flex;align-items:center;gap:6px}
        .stat i.fa-star{color:#FFD43B}
        .stat i.fa-trophy{color:#FFD43B}
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    <div class="container">
        <div class="header">
            <div class="logo"><i class="fab fa-python"></i><span>PyPath</span></div>
            <div class="user-stats">
                <div class="stat"><i class="fas fa-star"></i><span id="scoreValue">0</span></div>
                <div class="stat"><i class="fas fa-trophy"></i><span id="bestScoreValue">0</span></div>
            </div>
            <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> На главную</button>
        </div>
        <div class="profile-card">
            <div class="avatar-large" id="userAvatar">?</div>
            <h2 id="userEmail"></h2>
            <p id="rankName" style="color:#3B82F6; margin-bottom:20px">Бронзовый код</p>
            <div class="stats-grid">
                <div class="stat-card"><i class="fas fa-star"></i><span id="totalScore">0</span><br>очков</div>
                <div class="stat-card"><i class="fas fa-check-circle"></i><span id="lessonsCount">0</span>/99<br>уроков</div>
                <div class="stat-card"><i class="fas fa-fire"></i><span id="maxStreak">0</span><br>макс. стрейк</div>
                <div class="stat-card"><i class="fas fa-crown"></i><span id="goldenCrownsCount">0</span><br>корон</div>
            </div>
            <div class="achievements-list">
                <h3><i class="fas fa-medal"></i> Достижения</h3>
                <div class="achievement-item"><span>10 уроков</span><span id="achLessons10">○</span></div>
                <div class="achievement-item"><span>25 уроков</span><span id="achLessons25">○</span></div>
                <div class="achievement-item"><span>50 уроков</span><span id="achLessons50">○</span></div>
                <div class="achievement-item"><span>99 уроков</span><span id="achLessons99">○</span></div>
                <div class="achievement-item"><span>7-дневный стрейк</span><span id="achStreak7">○</span></div>
                <div class="achievement-item"><span>30-дневный стрейк</span><span id="achStreak30">○</span></div>
                <div class="achievement-item"><span>Золотая корона</span><span id="achGoldenCrown">○</span></div>
                <div class="achievement-item"><span>Мастер Python</span><span id="achMaster">○</span></div>
            </div>
            <div class="setting"><span><i class="fas fa-volume-up"></i> Звуки</span><label class="switch"><input type="checkbox" id="soundToggle"><span class="slider"></span></label></div>
            <button class="btn" id="certBtn"><i class="fas fa-download"></i> Скачать сертификат</button>
            <button class="btn btn-danger" id="resetBtn"><i class="fas fa-trash"></i> Сбросить прогресс</button>
            <button class="btn btn-danger" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
        </div>
    </div>
    <script>
        const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d');
        function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
        resize();addEventListener('resize',resize);
        let particles=[];
        for(let i=0;i<80;i++)particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2,a:Math.random()*0.3,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2});
        function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);for(let p of particles){p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(59,130,246,${p.a})`;ctx.fill()}requestAnimationFrame(animate)}
        animate();
    </script>
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>

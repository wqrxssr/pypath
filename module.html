<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PyPath — Модуль</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="logo">
                <i class="fas fa-code"></i> PyPath
            </div>
            <div class="stats-bar">
                <div class="stat">
                    <i class="fas fa-bolt" style="color: var(--warning);"></i>
                    <span id="energyValue">5</span>
                </div>
                <div class="stat">
                    <i class="fas fa-heart" style="color: var(--danger);"></i>
                    <span id="livesValue">5</span>
                </div>
                <div class="stat">
                    <i class="fas fa-star" style="color: var(--warning);"></i>
                    <span id="scoreValue">0</span>
                </div>
            </div>
            <button id="backBtn" class="icon-btn">
                <i class="fas fa-arrow-left"></i> Назад
            </button>
        </div>

        <div class="glass-card" style="padding: 24px; margin-bottom: 24px; text-align: center;">
            <div class="module-icon" style="font-size: 3rem;" id="moduleIcon">🌱</div>
            <h1 id="moduleTitle">Модуль A1</h1>
            <p id="moduleDesc" style="color: var(--text-secondary);">Начинающий</p>
            <div class="progress-bar" style="margin-top: 16px;">
                <div class="progress-fill" id="moduleProgress"></div>
            </div>
            <div style="margin-top: 8px; font-size: 0.85rem;" id="progressText">0/14 уроков</div>
        </div>

        <div class="lessons-list" id="lessonsList"></div>

        <div class="glass-card" style="margin: 24px 0; padding: 24px; text-align: center;">
            <h3><i class="fas fa-clipboard-list"></i> Тест модуля</h3>
            <p style="color: var(--text-secondary); margin: 8px 0;">Проверь свои знания! Для перехода к следующему модулю нужно набрать 70%.</p>
            <button id="startTestBtn" class="btn-primary">
                <i class="fas fa-play"></i> Начать тест
            </button>
        </div>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>

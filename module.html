<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPath — Модуль</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="logo">🐍 PyPath</div>
            <div class="stats-bar">
                <div class="stat">⚡ <span id="energyValue">5</span></div>
                <div class="stat">❤️ <span id="livesValue">5</span></div>
                <div class="stat">⭐ <span id="scoreValue">0</span></div>
            </div>
            <button id="backBtn" class="icon-btn">← Назад</button>
        </div>

        <div class="module-header">
            <h1 id="moduleTitle">Модуль A1</h1>
            <p id="moduleDesc">🌱 Начинающий</p>
        </div>

        <div class="lessons-list" id="lessonsList"></div>

        <div class="module-test-section">
            <h3>📝 Тест модуля</h3>
            <p>Проверь свои знания! Для перехода к следующему модулю нужно набрать 70%.</p>
            <button id="startTestBtn" class="btn-primary">Начать тест</button>
        </div>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>

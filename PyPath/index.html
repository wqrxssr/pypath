<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPath — Вход</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>🐍 PyPath</h1>
            <p class="subtitle">Изучай Python играя</p>
            
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Вход</button>
                <button class="auth-tab" data-tab="register">Регистрация</button>
            </div>

            <!-- Форма входа -->
            <form id="loginForm" class="auth-form active">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Пароль" required>
                <button type="submit" class="btn-primary">Войти</button>
                <a href="#" id="forgotPassword" class="forgot-link">Забыли пароль?</a>
            </form>

            <!-- Форма регистрации -->
            <form id="registerForm" class="auth-form">
                <input type="email" id="regEmail" placeholder="Email" required>
                <input type="password" id="regPassword" placeholder="Пароль (мин. 6 символов)" required>
                <input type="password" id="regConfirm" placeholder="Повторите пароль" required>
                <button type="submit" class="btn-primary">Зарегистрироваться</button>
            </form>

            <div id="authMessage" class="auth-message"></div>
        </div>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>

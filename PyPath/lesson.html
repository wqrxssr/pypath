<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPath — Урок</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="logo">🐍 PyPath</div>
            <div class="stats-bar">
                <div class="stat">⚡ <span id="energyValue">5</span></div>
                <div class="stat">❤️ <span id="livesValue">5</span></div>
                <div class="stat">⭐ <span id="scoreValue">0</span></div>
            </div>
            <button id="exitBtn" class="icon-btn">✖️</button>
        </div>

        <div class="lesson-header">
            <h1 id="lessonTitle">Урок 1: Переменные</h1>
            <p id="lessonDescription">Собери код в правильном порядке</p>
        </div>

        <!-- Золотая корона (если получена) -->
        <div id="goldenCrown" class="golden-crown" style="display: none;">
            👑 Золотая корона! 👑
        </div>

        <!-- Пазл -->
        <div class="puzzle-area">
            <div class="puzzle-container" id="puzzleContainer"></div>
            <button id="checkBtn" class="btn-primary">✅ ПРОВЕРИТЬ</button>
            <button id="hintBtn" class="btn-secondary">💡 ПОДСКАЗКА (20 ⭐)</button>
        </div>

        <!-- Вопрос "Объясни" (появляется после правильного ответа) -->
        <div id="explainBlock" class="explain-block" style="display: none;">
            <h3>❓ Объясни, почему так</h3>
            <p id="explainQuestion"></p>
            <div id="explainOptions" class="explain-options"></div>
            <button id="explainSubmitBtn" class="btn-primary">Ответить</button>
        </div>

        <!-- Сообщения -->
        <div id="messageArea" class="message-area"></div>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PyPath — Изучай Python</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',system-ui,sans-serif;background:#0a0a1a;color:#fff;min-height:100vh}
        #particles-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
        body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background-image:linear-gradient(rgba(59,130,246,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
        .container{position:relative;z-index:2;max-width:450px;margin:0 auto;padding:20px;min-height:100vh;display:flex;align-items:center}
        .auth-card{background:rgba(15,20,35,0.75);backdrop-filter:blur(20px);border-radius:32px;padding:40px 32px;border:1px solid rgba(59,130,246,0.25);width:100%}
        h1{text-align:center;font-size:2rem;background:linear-gradient(135deg,#fff,#3B82F6,#FFD43B);-webkit-background-clip:text;background-clip:text;color:transparent}
        .subtitle{text-align:center;color:#94a3b8;margin-bottom:32px}
        .tabs{display:flex;gap:12px;margin-bottom:28px;background:rgba(255,255,255,0.03);padding:4px;border-radius:60px}
        .tab{flex:1;padding:10px;background:0;border:none;color:#94a3b8;font-weight:600;cursor:pointer;border-radius:40px}
        .tab.active{background:rgba(59,130,246,0.2);color:#3B82F6}
        .auth-form{display:none;flex-direction:column;gap:16px}
        .auth-form.active{display:flex}
        .input-group{position:relative}
        .input-group i{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:#94a3b8}
        input{width:100%;padding:14px 16px 14px 44px;background:rgba(255,255,255,0.05);border:1px solid rgba(59,130,246,0.2);border-radius:16px;color:#fff}
        input:focus{outline:none;border-color:#3B82F6}
        .captcha-label{font-size:0.8rem;color:#94a3b8;margin-bottom:8px;display:flex;align-items:center;gap:8px}
        .captcha-label code{background:#1a1f2e;padding:4px 10px;border-radius:12px;color:#FFD43B}
        .captcha-status{font-size:0.75rem;margin-top:8px}
        .btn{background:linear-gradient(135deg,#3B82F6,#1d4ed8);border:none;padding:14px;border-radius:40px;color:#fff;font-weight:700;cursor:pointer}
        .btn:disabled{opacity:0.5;cursor:not-allowed}
        .message{margin-top:20px;text-align:center;font-size:0.8rem;padding:10px;border-radius:12px}
        .message.error{background:rgba(239,68,68,0.15);color:#ef4444}
        .forgot-link{text-align:center;margin-top:16px;color:#94a3b8;text-decoration:none;display:block}
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    <div class="container">
        <div class="auth-card">
            <h1>PyPath</h1>
            <div class="subtitle">Изучай Python играя</div>
            <div class="tabs">
                <button class="tab active" data-tab="login">Вход</button>
                <button class="tab" data-tab="register">Регистрация</button>
            </div>
            <form id="loginForm" class="auth-form active">
                <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="Email" required></div>
                <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="Пароль" required></div>
                <button type="submit" class="btn">Войти</button>
                <a href="#" id="forgotPassword" class="forgot-link">Забыли пароль?</a>
            </form>
            <form id="registerForm" class="auth-form">
                <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="regEmail" placeholder="Email" required></div>
                <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="regPassword" placeholder="Пароль (мин. 6)" required></div>
                <div class="input-group"><i class="fas fa-check-circle"></i><input type="password" id="regConfirm" placeholder="Повторите пароль" required></div>
                <div class="captcha-block">
                    <div class="captcha-label"><i class="fas fa-code"></i><span>Напишите код:</span><code>print("Hello")</code></div>
                    <div class="input-group"><i class="fas fa-terminal"></i><input type="text" id="captchaInput" placeholder='print("Hello")'></div>
                    <div id="captchaStatus" class="captcha-status"></div>
                </div>
                <button type="submit" id="registerBtn" class="btn" disabled>Зарегистрироваться</button>
            </form>
            <div id="authMessage" class="message"></div>
        </div>
    </div>
    <script>
        const canvas=document.getElementById('particles-canvas'),ctx=canvas.getContext('2d');
        function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
        resize();addEventListener('resize',resize);
        let particles=[];
        for(let i=0;i<100;i++)particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+1,a:Math.random()*0.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.2});
        function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);for(let p of particles){p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(59,130,246,${p.a})`;ctx.fill()}requestAnimationFrame(animate)}
        animate();
        const captchaInput=document.getElementById('captchaInput'),captchaStatus=document.getElementById('captchaStatus'),registerBtn=document.getElementById('registerBtn');
        if(captchaInput)captchaInput.addEventListener('input',()=>{let v=captchaInput.value.trim();if(v==='print("Hello")'||v==="print('Hello')"){captchaStatus.innerHTML='<i class="fas fa-check-circle"></i> Верно!';captchaStatus.style.color='#22c55e';registerBtn.disabled=false}else{captchaStatus.innerHTML='<i class="fas fa-times-circle"></i> Неверно. Напишите: print("Hello")';captchaStatus.style.color='#ef4444';registerBtn.disabled=true}});
        document.querySelectorAll('.tab').forEach(t=>{t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');let n=t.dataset.tab;document.getElementById('loginForm').classList.toggle('active',n==='login');document.getElementById('registerForm').classList.toggle('active',n==='register')}});
    </script>
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>

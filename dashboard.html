<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PyPath — Панель обучения</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="logo">
                <i class="fas fa-code"></i> PyPath
            </div>
            <div class="stats-bar">
                <div class="stat"><i class="fas fa-bolt"></i> <span id="energyValue">5</span>/5</div>
                <div class="stat"><i class="fas fa-heart"></i> <span id="livesValue">5</span>/5</div>
                <div class="stat"><i class="fas fa-star"></i> <span id="scoreValue">0</span></div>
                <div class="stat" id="streakBtn" style="cursor: pointer;"><i class="fas fa-fire"></i> <span id="streakValue">0</span></div>
            </div>
            <div class="actions-bar">
                <button id="themeToggle" class="icon-btn"><i class="fas fa-moon"></i> <span>Тема</span></button>
                <button id="soundToggle" class="icon-btn"><i class="fas fa-volume-up"></i> <span>Звук</span></button>
                <button id="profileBtn" class="icon-btn"><i class="fas fa-user"></i> <span>Профиль</span></button>
                <button id="logoutBtn" class="icon-btn"><i class="fas fa-sign-out-alt"></i> <span>Выход</span></button>
            </div>
        </div>

        <div class="modules-grid" id="modulesGrid"></div>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PyPath — Тест</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="logo">
                <i class="fas fa-code"></i> PyPath
            </div>
            <div class="stats-bar">
                <div class="stat">
                    <i class="fas fa-star" style="color: var(--warning);"></i>
                    <span id="scoreValue">0</span>
                </div>
            </div>
            <button id="exitBtn" class="icon-btn">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="glass-card" style="padding: 32px; margin-bottom: 24px; text-align: center;">
            <h1 id="testTitle">Тест модуля A1</h1>
            <p style="color: var(--text-secondary); margin-top: 8px;">Проверь свои знания</p>
            <div class="progress-bar" style="margin: 16px 0;">
                <div class="progress-fill" id="testProgress"></div>
            </div>
            <div>Правильных ответов: <span id="correctCount">0</span> / <span id="totalQuestions">0</span></div>
        </div>

        <div id="questionContainer" class="glass-card" style="padding: 32px; margin-bottom: 24px;">
            <!-- Вопросы загружаются из JS -->
        </div>

        <div class="test-controls" style="display: flex; justify-content: space-between; gap: 12px; margin-bottom: 24px;">
            <button id="prevBtn" class="btn-secondary" disabled>
                <i class="fas fa-arrow-left"></i> Назад
            </button>
            <button id="nextBtn" class="btn-primary">
                Далее <i class="fas fa-arrow-right"></i>
            </button>
            <button id="submitTestBtn" class="btn-primary" style="display: none; background: var(--success);">
                <i class="fas fa-check-circle"></i> Завершить тест
            </button>
        </div>

        <div id="testResult" class="glass-card" style="padding: 32px; display: none; text-align: center;"></div>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>

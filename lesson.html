<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPath — Урок</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Дополнительные стили для страницы урока */
        .lesson-container {
            position: relative;
            z-index: 2;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .lesson-card {
            background: rgba(15, 20, 35, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 32px;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .lesson-card h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff, #3B82F6, #FFD43B);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .theory {
            background: #0f1420;
            border-radius: 20px;
            padding: 24px;
            margin: 20px 0;
            line-height: 1.6;
            border-left: 4px solid #3B82F6;
        }

        .theory p { margin-bottom: 16px; color: #e2e8f0; }
        .theory h4 { color: #FFD43B; margin: 16px 0 8px 0; }
        .theory ul { margin-left: 20px; color: #94a3b8; }
        .theory code, .theory pre {
            background: #0a0e17;
            padding: 4px 8px;
            border-radius: 8px;
            font-family: 'Fira Code', monospace;
            color: #FFD43B;
        }
        .theory pre {
            padding: 12px;
            overflow-x: auto;
            margin: 12px 0;
        }

        .task-area {
            margin-top: 24px;
            background: #0f1420;
            border-radius: 20px;
            padding: 24px;
        }

        .task-description {
            color: #e2e8f0;
            margin-bottom: 16px;
            font-weight: 500;
            font-size: 1rem;
            line-height: 1.5;
        }

        .task-requirements {
            background: rgba(59, 130, 246, 0.1);
            padding: 12px 16px;
            border-radius: 12px;
            margin: 16px 0;
            border-left: 3px solid #3B82F6;
        }

        .task-requirements p {
            margin: 4px 0;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .task-hint {
            background: rgba(255, 212, 59, 0.1);
            padding: 12px 16px;
            border-radius: 12px;
            margin: 16px 0;
            border-left: 3px solid #FFD43B;
        }

        .task-hint p {
            margin: 0;
            font-size: 0.9rem;
            color: #FFD43B;
        }

        textarea, input {
            width: 100%;
            padding: 14px;
            background: #0a0e17;
            border: 1px solid #3B82F6;
            border-radius: 12px;
            color: #fff;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            resize: vertical;
            margin: 10px 0;
        }

        textarea:focus, input:focus {
            outline: none;
            border-color: #FFD43B;
        }

        .btn {
            background: linear-gradient(135deg, #3B82F6, #1d4ed8);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }

        .btn-next {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .puzzle-piece {
            background: #1a1f2e;
            padding: 14px;
            margin: 10px 0;
            border-radius: 12px;
            cursor: grab;
            text-align: center;
            border: 1px solid rgba(59, 130, 246, 0.3);
            transition: all 0.2s;
        }

        .puzzle-piece:hover {
            border-color: #3B82F6;
            background: rgba(59, 130, 246, 0.1);
        }

        .puzzle-piece:active {
            cursor: grabbing;
        }

        .message {
            margin-top: 20px;
            padding: 14px 20px;
            border-radius: 12px;
            text-align: center;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .message i { font-size: 1.2rem; }
        .message.success { background: rgba(34, 197, 94, 0.15); border: 1px solid #22c55e; color: #22c55e; }
        .message.success i { color: #22c55e; }
        .message.error { background: rgba(239, 68, 68, 0.15); border: 1px solid #ef4444; color: #ef4444; }
        .message.error i { color: #ef4444; }
        .message.info { background: rgba(59, 130, 246, 0.15); border: 1px solid #3B82F6; color: #3B82F6; }
        .message.info i { color: #3B82F6; }

        .checkbox-options label, .explain-options label {
            display: block;
            margin: 10px 0;
            padding: 12px;
            background: #1a1f2e;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .checkbox-options label:hover, .explain-options label:hover {
            background: rgba(59, 130, 246, 0.2);
        }

        .user-stats { display: flex; gap: 12px; align-items: center; }
        .stat {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stat i.fa-bolt { color: #FFD43B; }
        .stat i.fa-heart { color: #ff6b6b; }
        .stat i.fa-star { color: #FFD43B; }

        .back-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1rem;
            transition: color 0.2s;
        }
        .back-btn:hover { color: #3B82F6; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 20, 35, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 60px;
            padding: 12px 24px;
            margin-bottom: 32px;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .logo i { color: #FFD43B; }
        .logo span {
            background: linear-gradient(135deg, #3B82F6, #FFD43B);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        @media (max-width: 768px) {
            .lesson-card { padding: 20px; }
            .lesson-card h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    <div class="lesson-container">
        <div class="header">
            <div class="logo"><i class="fab fa-python"></i><span>PyPath</span></div>
            <div class="user-stats">
                <div class="stat"><i class="fas fa-bolt"></i><span id="energyValue">5</span></div>
                <div class="stat"><i class="fas fa-heart"></i><span id="livesValue">5</span></div>
                <div class="stat"><i class="fas fa-star"></i><span id="scoreValue">0</span></div>
            </div>
            <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> К модулю</button>
        </div>
        <div class="lesson-card">
            <div id="loadingMessage" class="message info">
                <i class="fas fa-spinner fa-pulse"></i> Загрузка урока...
            </div>
            <div id="lessonContent" style="display: none;">
                <h1 id="lessonTitle"></h1>
                <div id="theoryBlock" class="theory"></div>
                <button id="nextBtn" class="btn btn-next">Далее <i class="fas fa-arrow-right"></i></button>
                <div id="taskBlock" style="display: none;"></div>
                <div id="messageArea" class="message"></div>
            </div>
        </div>
    </div>

    <script>
        // Частицы
        const canvas = document.getElementById('particles'), ctx = canvas.getContext('2d');
        function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
        resize(); addEventListener('resize', resize);
        let particles = [];
        for (let i = 0; i < 80; i++) particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: Math.random() * 2, a: Math.random() * 0.3, vx: (Math.random() - 0.5) * 0.2, vy: (Math.random() - 0.5) * 0.2 });
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let p of particles) {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(59, 130, 246, ${p.a})`;
                ctx.fill();
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
    <script type="module">
        import { 
            auth, db, 
            onAuthStateChanged, signOut,
            doc, getDoc, updateDoc,
            getInitialUserData
        } from './firebase-config.js';
        
        // Получаем параметры из URL
        const urlParams = new URLSearchParams(window.location.search);
        const moduleId = urlParams.get('module');
        const lessonNum = urlParams.get('lesson');
        const lessonId = `${moduleId}_${lessonNum}`;
        
        let currentUser = null;
        let userData = null;
        let currentLessonContent = null;
        let currentTaskData = null;
        
        // Функция показа сообщения
        function showMessage(text, type = 'info') {
            const msgDiv = document.getElementById('messageArea');
            if (msgDiv) {
                let icon = '';
                if (type === 'success') icon = '<i class="fas fa-check-circle"></i> ';
                else if (type === 'error') icon = '<i class="fas fa-times-circle"></i> ';
                else icon = '<i class="fas fa-info-circle"></i> ';
                msgDiv.innerHTML = icon + text;
                msgDiv.className = `message ${type}`;
                setTimeout(() => {
                    if (msgDiv) {
                        msgDiv.innerHTML = '';
                        msgDiv.className = 'message';
                    }
                }, 3000);
            }
        }
        
        // Обновление UI
        function updateUI() {
            const energyEl = document.getElementById('energyValue');
            const livesEl = document.getElementById('livesValue');
            const scoreEl = document.getElementById('scoreValue');
            if (energyEl) energyEl.textContent = userData?.energy || 5;
            if (livesEl) livesEl.textContent = userData?.lives || 5;
            if (scoreEl) scoreEl.textContent = userData?.totalScore || 0;
        }
        
        // Сохранение данных
        async function saveUserData() {
            if (!currentUser || !userData) return;
            const userRef = doc(db, 'users', currentUser.uid);
            await updateDoc(userRef, userData);
        }
        
        // Завершение урока
        async function completeLesson() {
            if (!currentUser || !userData) return;
            
            // Проверяем, не пройден ли уже урок
            if (userData.completedLessons?.includes(lessonId)) {
                showMessage('Вы уже прошли этот урок!', 'info');
                setTimeout(() => {
                    window.location.href = `module.html?module=${moduleId}`;
                }, 1500);
                return;
            }
            
            // Тратим энергию
            if (userData.energy <= 0) {
                showMessage('Недостаточно энергии! Подождите восстановления.', 'error');
                return;
            }
            
            userData.energy -= 1;
            
            // Добавляем урок в пройденные
            if (!userData.completedLessons) userData.completedLessons = [];
            userData.completedLessons.push(lessonId);
            
            // Начисляем очки (10 за урок)
            const pointsEarned = 10;
            userData.totalScore = (userData.totalScore || 0) + pointsEarned;
            
            // Восстанавливаем жизнь за урок
            userData.lives = Math.min(5, (userData.lives || 5) + 1);
            
            // Обновляем статистику
            if (!userData.stats) userData.stats = {};
            userData.stats.totalLessonsCompleted = (userData.stats.totalLessonsCompleted || 0) + 1;
            
            await saveUserData();
            updateUI();
            
            showMessage(`Урок пройден! +${pointsEarned} очков!`, 'success');
            
            // Ждём 1.5 секунды и возвращаемся к модулю
            setTimeout(() => {
                window.location.href = `module.html?module=${moduleId}`;
            }, 1500);
        }
        
        // Функция подсветки кода
        function highlightCode(code) {
            const keywords = ['def', 'if', 'else', 'elif', 'for', 'while', 'return', 'import', 'from', 'class', 'try', 'except', 'finally', 'with', 'as', 'pass', 'break', 'continue', 'lambda', 'and', 'or', 'not', 'is', 'None', 'True', 'False', 'in', 'global', 'nonlocal'];
            let escaped = code.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
            escaped = escaped.replace(/(#.*$)/gm, '<span style="color:#6a9955;">$1</span>');
            escaped = escaped.replace(/(["'])(?:(?=(\\?))\2.)*?\1/g, '<span style="color:#ce9178;">$&</span>');
            escaped = escaped.replace(/\b(\d+(?:\.\d+)?)\b/g, '<span style="color:#b5cea8;">$1</span>');
            keywords.forEach(keyword => {
                const regex = new RegExp(`\\b(${keyword})\\b`, 'g');
                escaped = escaped.replace(regex, '<span style="color:#569cd6;">$1</span>');
            });
            escaped = escaped.replace(/\b([a-zA-Z_][a-zA-Z0-9_]*)(?=\()/g, '<span style="color:#dcdcaa;">$1</span>');
            return escaped;
        }
        
        function applyCodeHighlighting() {
            const codeBlocks = document.querySelectorAll('.theory pre, .theory code');
            codeBlocks.forEach(block => {
                if (block.textContent && !block.classList.contains('highlighted')) {
                    block.innerHTML = highlightCode(block.textContent);
                    block.classList.add('highlighted');
                }
            });
        }
        
        // Рендер теории и задания
        function renderLesson() {
            if (!currentLessonContent) return;
            
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('lessonContent').style.display = 'block';
            document.getElementById('lessonTitle').innerHTML = currentLessonContent.title;
            document.getElementById('theoryBlock').innerHTML = currentLessonContent.theory;
            applyCodeHighlighting();
            
            currentTaskData = currentLessonContent.task;
            
            document.getElementById('nextBtn').onclick = () => {
                document.getElementById('theoryBlock').style.display = 'none';
                document.getElementById('nextBtn').style.display = 'none';
                document.getElementById('taskBlock').style.display = 'block';
                
                const taskContainer = document.getElementById('taskBlock');
                if (!taskContainer) return;
                
                taskContainer.innerHTML = `
                    <div class="task-description"><i class="fas fa-tasks"></i> ${currentTaskData.description || 'Выполните задание'}</div>
                    <div class="task-requirements">
                        <p><i class="fas fa-clipboard-list"></i> <strong>Что нужно сделать:</strong></p>
                        ${(currentTaskData.requirements || '').split('\n').map(r => `<p>${r}</p>`).join('')}
                    </div>
                    <div class="task-hint">
                        <p><i class="fas fa-lightbulb"></i> <strong>Подсказка:</strong> ${currentTaskData.hint || 'Подумайте ещё раз'}</p>
                    </div>
                `;
                
                if (currentTaskData.type === 'code') {
                    taskContainer.innerHTML += `<textarea id="taskAnswer" rows="4" placeholder="Напишите свой код здесь..."></textarea>`;
                    taskContainer.innerHTML += `<button class="btn" id="checkTaskBtn"><i class="fas fa-check"></i> Проверить</button>`;
                    document.getElementById('checkTaskBtn').onclick = () => {
                        const answer = document.getElementById('taskAnswer').value;
                        if (currentTaskData.validator(answer)) {
                            completeLesson();
                        } else {
                            showMessage('Неправильно. Попробуйте ещё раз.', 'error');
                        }
                    };
                } else if (currentTaskData.type === 'fill') {
                    taskContainer.innerHTML += `<input type="text" id="taskAnswer" placeholder="Вставьте пропущенное слово">`;
                    taskContainer.innerHTML += `<button class="btn" id="checkTaskBtn"><i class="fas fa-check"></i> Проверить</button>`;
                    document.getElementById('checkTaskBtn').onclick = () => {
                        const answer = document.getElementById('taskAnswer').value.trim();
                        if (answer === currentTaskData.correct) {
                            completeLesson();
                        } else {
                            showMessage(`Неправильно. Правильный ответ: ${currentTaskData.correct}`, 'error');
                        }
                    };
                } else if (currentTaskData.type === 'checkbox') {
                    let optionsHtml = '<div class="checkbox-options">';
                    currentTaskData.options.forEach((opt, idx) => {
                        optionsHtml += `<label><input type="checkbox" value="${idx}"> ${opt}</label>`;
                    });
                    optionsHtml += '</div><button class="btn" id="checkTaskBtn"><i class="fas fa-check"></i> Проверить</button>';
                    taskContainer.innerHTML += optionsHtml;
                    document.getElementById('checkTaskBtn').onclick = () => {
                        const selected = Array.from(document.querySelectorAll('#taskBlock input:checked')).map(cb => parseInt(cb.value));
                        const isCorrect = selected.length === currentTaskData.correct.length && currentTaskData.correct.every(v => selected.includes(v));
                        if (isCorrect) {
                            completeLesson();
                        } else {
                            showMessage('Неправильно. Попробуйте ещё раз.', 'error');
                        }
                    };
                } else if (currentTaskData.type === 'explain') {
                    let optionsHtml = '<div class="explain-options">';
                    currentTaskData.options.forEach((opt, idx) => {
                        optionsHtml += `<label><input type="radio" name="explain" value="${idx}"> ${opt}</label>`;
                    });
                    optionsHtml += '</div><button class="btn" id="checkTaskBtn"><i class="fas fa-check"></i> Проверить</button>';
                    taskContainer.innerHTML += optionsHtml;
                    document.getElementById('checkTaskBtn').onclick = () => {
                        const selected = document.querySelector('input[name="explain"]:checked');
                        if (selected && parseInt(selected.value) === currentTaskData.correct) {
                            completeLesson();
                        } else {
                            showMessage('Неправильно. Попробуйте ещё раз.', 'error');
                        }
                    };
                }
            };
        }
        
        // Загрузка контента урока из theory.js (глобальная переменная)
        function loadLessonContent() {
            // Проверяем, загрузилась ли теория
            if (typeof lessonsContent !== 'undefined' && lessonsContent[lessonId]) {
                currentLessonContent = lessonsContent[lessonId];
                renderLesson();
            } else {
                // Ждём загрузки theory.js
                setTimeout(() => {
                    if (typeof lessonsContent !== 'undefined' && lessonsContent[lessonId]) {
                        currentLessonContent = lessonsContent[lessonId];
                        renderLesson();
                    } else {
                        document.getElementById('loadingMessage').innerHTML = '<i class="fas fa-exclamation-triangle"></i> Ошибка загрузки теории. Попробуйте обновить страницу.';
                        document.getElementById('loadingMessage').className = 'message error';
                    }
                }, 500);
            }
        }
        
        // Аутентификация и загрузка данных
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            
            currentUser = user;
            const userRef = doc(db, 'users', user.uid);
            const userSnap = await getDoc(userRef);
            
            if (userSnap.exists()) {
                userData = userSnap.data();
            } else {
                userData = getInitialUserData();
                await updateDoc(userRef, userData);
            }
            
            updateUI();
            
            // Обновляем ресурсы
            const now = Date.now();
            const energyPassed = Math.floor((now - (userData.lastEnergyUpdate || now)) / 3600000);
            if (energyPassed > 0) {
                userData.energy = Math.min(5, (userData.energy || 5) + energyPassed);
                userData.lastEnergyUpdate = now;
                await saveUserData();
                updateUI();
            }
            
            const lifePassed = Math.floor((now - (userData.lastLifeUpdate || now)) / 1800000);
            if (lifePassed > 0) {
                userData.lives = Math.min(5, (userData.lives || 5) + lifePassed);
                userData.lastLifeUpdate = now;
                await saveUserData();
                updateUI();
            }
            
            // Загружаем контент урока
            loadLessonContent();
        });
        
        // Кнопка назад
        document.getElementById('backBtn').onclick = () => {
            window.location.href = `module.html?module=${moduleId}`;
        };
    </script>
    <script src="theory.js"></script>
</body>
</html>

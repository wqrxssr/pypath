<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPath — Урок</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #0a0a1a; color: white; }
        #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .container { position: relative; z-index: 2; max-width: 1000px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: rgba(10,10,26,0.7); backdrop-filter: blur(16px); border-radius: 60px; padding: 12px 24px; margin-bottom: 40px; border: 1px solid rgba(59,130,246,0.2); }
        .back-btn { background: transparent; border: none; color: #94a3b8; cursor: pointer; font-size: 1rem; }
        .lesson-card { background: rgba(15,20,35,0.6); backdrop-filter: blur(12px); border-radius: 28px; padding: 32px; margin-bottom: 24px; border: 1px solid rgba(59,130,246,0.2); }
        .task-area { background: #1a1f2e; border-radius: 20px; padding: 20px; margin: 20px 0; font-family: monospace; }
        input, textarea { width: 100%; padding: 12px; background: #0f1420; border: 1px solid #3B82F6; border-radius: 12px; color: white; margin: 10px 0; }
        .btn { background: linear-gradient(135deg,#3B82F6,#1d4ed8); border: none; padding: 12px 24px; border-radius: 40px; color: white; cursor: pointer; margin-right: 12px; }
        .message { margin-top: 20px; padding: 12px; border-radius: 12px; text-align: center; }
        .success { background: rgba(34,197,94,0.2); border: 1px solid #22c55e; color: #22c55e; }
        .error { background: rgba(239,68,68,0.2); border: 1px solid #ef4444; color: #ef4444; }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    <div class="container">
        <div class="header">
            <div class="logo"><i class="fab fa-python"></i> <span>PyPath</span></div>
            <button class="back-btn" onclick="window.location.href='module.html?module=A1'"><i class="fas fa-arrow-left"></i> К модулю</button>
        </div>
        <div class="lesson-card">
            <h1 id="lessonTitle">Переменные в Python</h1>
            <div class="task-area">
                <p><strong>Теория:</strong> Переменная — это контейнер для данных. В Python переменная создаётся присваиванием: <code>x = 5</code></p>
                <p style="margin-top: 16px;"><strong>Задание:</strong> Создай переменную <code>name</code> со значением "Анна" и выведи её на экран.</p>
            </div>
            <textarea id="codeInput" rows="4" placeholder="Напиши свой код здесь..."></textarea>
            <button class="btn" id="checkBtn"><i class="fas fa-check"></i> Проверить</button>
            <div id="message" class="message"></div>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resize(); window.addEventListener('resize', resize);
        const particles = [];
        for (let i = 0; i < 80; i++) particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: Math.random() * 2, a: Math.random() * 0.3, vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.2 });
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); for (let p of particles) { p.x += p.vx; p.y += p.vy; if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0; if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fillStyle = `rgba(59, 130, 246, ${p.a})`; ctx.fill(); } requestAnimationFrame(animate); }
        animate();
        document.getElementById('checkBtn').onclick = () => {
            const code = document.getElementById('codeInput').value;
            if (code.includes('name') && code.includes('print')) {
                document.getElementById('message').innerHTML = '<i class="fas fa-check-circle"></i> Правильно! +30 очков';
                document.getElementById('message').className = 'message success';
                setTimeout(() => window.location.href = 'module.html?module=A1', 1500);
            } else {
                document.getElementById('message').innerHTML = '<i class="fas fa-times-circle"></i> Неправильно. Попробуй: name = "Анна"<br>print(name)';
                document.getElementById('message').className = 'message error';
            }
        };
    </script>
</body>
</html>

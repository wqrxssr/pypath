<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPath — Урок</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',system-ui,sans-serif;background:#0a0a1a;color:#fff;min-height:100vh}
        #particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
        body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background-image:linear-gradient(rgba(59,130,246,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
        .container{position:relative;z-index:2;max-width:1000px;margin:0 auto;padding:20px}
        .header{display:flex;justify-content:space-between;align-items:center;background:rgba(15,20,35,0.7);backdrop-filter:blur(16px);border-radius:60px;padding:12px 24px;margin-bottom:32px;border:1px solid rgba(59,130,246,0.2)}
        .logo i{color:#FFD43B}
        .logo span{background:linear-gradient(135deg,#3B82F6,#FFD43B);-webkit-background-clip:text;background-clip:text;color:transparent}
        .back-btn{background:0;border:none;color:#94a3b8;cursor:pointer;font-size:1rem}
        .back-btn:hover{color:#3B82F6}
        .lesson-card{background:rgba(15,20,35,0.6);backdrop-filter:blur(12px);border-radius:28px;padding:32px;margin-bottom:24px;border:1px solid rgba(59,130,246,0.2)}
        .theory{background:#1a1f2e;border-radius:20px;padding:20px;margin:20px 0;line-height:1.6}
        .theory code{background:#0f1420;padding:2px 6px;border-radius:6px;color:#FFD43B}
        .task-area{margin-top:24px}
        textarea{width:100%;padding:12px;background:#0f1420;border:1px solid #3B82F6;border-radius:12px;color:#fff;font-family:monospace;margin:10px 0}
        input{width:100%;padding:12px;background:#0f1420;border:1px solid #3B82F6;border-radius:12px;color:#fff;margin:10px 0}
        .btn-check{background:linear-gradient(135deg,#3B82F6,#1d4ed8);border:none;padding:12px 24px;border-radius:40px;color:#fff;cursor:pointer;margin-top:12px}
        .btn-check:hover{transform:translateY(-2px);box-shadow:0 0 15px rgba(59,130,246,0.4)}
        .puzzle-piece{background:#1a1f2e;padding:12px;margin:8px 0;border-radius:12px;cursor:grab;text-align:center;border:1px solid rgba(59,130,246,0.3)}
        .puzzle-piece:active{cursor:grabbing}
        .message{margin-top:20px;padding:12px;border-radius:12px;text-align:center}
        .success{background:rgba(34,197,94,0.2);border:1px solid #22c55e;color:#22c55e}
        .error{background:rgba(239,68,68,0.2);border:1px solid #ef4444;color:#ef4444}
        .user-stats{display:flex;gap:12px;align-items:center}
        .stat{background:rgba(255,255,255,0.05);padding:6px 12px;border-radius:40px;font-size:0.8rem;display:flex;align-items:center;gap:6px}
        .stat i.fa-bolt{color:#FFD43B}
        .stat i.fa-heart{color:#ff6b6b}
        .stat i.fa-star{color:#FFD43B}
        .explain-options label{display:block;margin:8px 0;padding:10px;background:#1a1f2e;border-radius:12px;cursor:pointer}
        .checkbox-options label{display:block;margin:8px 0;padding:10px;background:#1a1f2e;border-radius:12px;cursor:pointer}
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    <div class="container">
        <div class="header">
            <div class="logo"><i class="fab fa-python"></i><span>PyPath</span></div>
            <div class="user-stats">
                <div class="stat"><i class="fas fa-bolt"></i><span id="energyValue">5</span></div>
                <div class="stat"><i class="fas fa-heart"></i><span id="livesValue">5</span></div>
                <div class="stat"><i class="fas fa-star"></i><span id="scoreValue">0</span></div>
            </div>
            <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> К модулю</button>
        </div>
        <div class="lesson-card">
            <h1 id="lessonTitle"></h1>
            <div class="theory" id="theoryContent"></div>
            <div class="task-area" id="taskContainer"></div>
            <div id="messageArea" class="message"></div>
        </div>
    </div>
    <script>
        const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d');
        function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
        resize();addEventListener('resize',resize);
        let particles=[];
        for(let i=0;i<80;i++)particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2,a:Math.random()*0.3,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2});
        function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);for(let p of particles){p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(59,130,246,${p.a})`;ctx.fill()}requestAnimationFrame(animate)}
        animate();
    </script>
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
